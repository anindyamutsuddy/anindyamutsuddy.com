<body>

<div id="scroll-progress"></div>
<script>
  // ── Dark mode ──
  const root    = document.documentElement;
  const saved   = localStorage.getItem('theme') || 'light';
  root.setAttribute('data-theme', saved);

  function updateToggleLabel() {
    const btn = document.getElementById('theme-toggle');
    if (!btn) return;
    const dark = root.getAttribute('data-theme') === 'dark';
    btn.innerHTML = dark ? '☀️ Light mode' : '🌙 Dark mode';
  }

  document.addEventListener('DOMContentLoaded', function () {
    updateToggleLabel();
    const btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateToggleLabel();
      });
    }
  });

  // ── Scroll progress bar ──
  const bar = document.getElementById('scroll-progress');
  if (bar) {
    window.addEventListener('scroll', () => {
      const scrolled = window.scrollY;
      const total    = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = (total > 0 ? (scrolled / total) * 100 : 0) + '%';
    }, { passive: true });
  }
</script>

<script src="data.js"></script>
<script>
  const d = siteData.beyond;

  // Currently
  const cg = document.getElementById('currently-grid');
  if (d.currently.reading) cg.innerHTML += `<div class="currently-card"><div class="currently-icon">📖</div><div><div class="currently-label">Currently Reading</div><div class="currently-value">${d.currently.reading.title}</div><div class="currently-sub">${d.currently.reading.author}</div></div></div>`;
  if (d.currently.watching) cg.innerHTML += `<div class="currently-card"><div class="currently-icon">🎬</div><div><div class="currently-label">Currently Watching</div><div class="currently-value">${d.currently.watching.title}</div><div class="currently-sub">${d.currently.watching.platform}</div></div></div>`;
  // Latest watch as second "currently" card if no watching
  if (!d.currently.watching && d.watches.length) {
    const w = d.watches[0];
    cg.innerHTML += `<div class="currently-card"><div class="currently-icon">${w.emoji}</div><div><div class="currently-label">Latest Acquisition</div><div class="currently-value">${w.name}</div><div class="currently-sub">${w.brand}</div></div></div>`;
  }

  // Watches
  const wg = document.getElementById('watch-grid');
  d.watches.forEach(w => {
    wg.innerHTML += `<div class="watch-card"><div class="watch-emoji">${w.emoji}</div><div class="watch-brand">${w.brand}</div><div class="watch-name">${w.name}</div></div>`;
  });

  // Books
  const bs = document.getElementById('book-shelf');
  d.books.forEach(b => {
    const statusLabel = b.status === 'reading' ? '● Currently Reading' : b.status === 'want' ? '◌ Want to Read' : '✓ Read';
    bs.innerHTML += `<div class="book-card"><div class="book-spine ${b.status}"></div><div><div class="book-status ${b.status}">${statusLabel}</div><div class="book-title">${b.title}</div><div class="book-author">${b.author}</div>${b.note ? `<div class="book-note">${b.note}</div>` : ''}</div></div>`;
  });

  // Activities
  const ag = document.getElementById('activity-grid');
  d.activities.forEach(a => {
    ag.innerHTML += `<div class="activity-card"><div class="activity-icon">${a.emoji}</div><div class="activity-title">${a.title}</div><div class="activity-desc">${a.desc}</div></div>`;
  });
</script>
